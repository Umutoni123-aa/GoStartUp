<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoStartup</title>

  <!-- Tailwind CSS (replace with local build for offline use) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="output.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <script>
    /* Tailwind custom colors and fonts */
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4a6cf7',
            dark:    '#0d1117',
            'd2':    '#111722',
            'd3':    '#1a2235',
            'd4':    '#222c40',
          },
          fontFamily: {
            heading: ['Lexend', 'sans-serif'],
            body:    ['Inter',  'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: rgba(17,23,34,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .dot-bg {
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 26px 26px;
    }

    .popular {
      transform: scale(1.05);
      box-shadow: 0 24px 60px rgba(74,108,247,0.35);
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade   { animation: fadeUp 0.7s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.25s; }
    .delay-3 { animation-delay: 0.4s; }

    #mobile-menu { display: none; }
    #mobile-menu.open { display: flex; }
  </style>
</head>

<body class="bg-d2 text-white">
